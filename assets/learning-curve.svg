<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" font-family="Helvetica Neue, Arial, sans-serif">
  <rect width="480" height="320" fill="#ffffff" rx="6"/>

  <!-- Grid -->
  <g stroke="#f0f2f5" stroke-width="1">
    <line x1="60" y1="40" x2="60" y2="270"/>
    <line x1="60" y1="270" x2="450" y2="270"/>
    <line x1="60" y1="212" x2="450" y2="212" stroke-dasharray="4,4"/>
    <line x1="60" y1="155" x2="450" y2="155" stroke-dasharray="4,4"/>
    <line x1="60" y1="97" x2="450" y2="97" stroke-dasharray="4,4"/>
    <line x1="60" y1="40" x2="450" y2="40" stroke-dasharray="4,4"/>
  </g>

  <!-- Y-axis labels -->
  <text x="50" y="275" text-anchor="end" font-size="10" fill="#6c757d">0</text>
  <text x="50" y="217" text-anchor="end" font-size="10" fill="#6c757d">5</text>
  <text x="50" y="160" text-anchor="end" font-size="10" fill="#6c757d">10</text>
  <text x="50" y="102" text-anchor="end" font-size="10" fill="#6c757d">15</text>
  <text x="50" y="45" text-anchor="end" font-size="10" fill="#6c757d">20</text>

  <!-- X-axis labels -->
  <text x="60" y="288" text-anchor="middle" font-size="10" fill="#6c757d">0</text>
  <text x="158" y="288" text-anchor="middle" font-size="10" fill="#6c757d">25</text>
  <text x="255" y="288" text-anchor="middle" font-size="10" fill="#6c757d">50</text>
  <text x="352" y="288" text-anchor="middle" font-size="10" fill="#6c757d">75</text>
  <text x="450" y="288" text-anchor="middle" font-size="10" fill="#6c757d">100</text>

  <!-- Axis titles -->
  <text x="255" y="308" text-anchor="middle" font-size="11" fill="#1a1a2e">Epoch</text>
  <text x="15" y="155" text-anchor="middle" font-size="11" fill="#1a1a2e" transform="rotate(-90, 15, 155)">Perplexity</text>

  <!-- Baseline (blue) - slow convergence -->
  <polyline points="60,44 99,62 138,88 177,112 216,135 255,155 294,168 333,177 372,183 411,186 450,188"
    fill="none" stroke="#0f3460" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ours (red) - fast convergence -->
  <polyline points="60,44 99,78 138,128 177,172 216,198 255,212 294,218 333,220 372,221 411,221 450,221"
    fill="none" stroke="#e94560" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Convergence marker for Ours -->
  <line x1="255" y1="212" x2="255" y2="270" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="255" y="245" text-anchor="middle" font-size="9" fill="#e94560" font-weight="600">50 ep</text>

  <!-- Legend -->
  <rect x="320" y="55" width="120" height="50" rx="4" fill="#ffffff" stroke="#dee2e6" stroke-width="1"/>
  <line x1="330" y1="72" x2="355" y2="72" stroke="#0f3460" stroke-width="2.5"/>
  <text x="362" y="76" font-size="11" fill="#1a1a2e">Transformer</text>
  <line x1="330" y1="92" x2="355" y2="92" stroke="#e94560" stroke-width="2.5"/>
  <text x="362" y="96" font-size="11" fill="#1a1a2e">Ours</text>
</svg>
