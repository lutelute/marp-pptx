<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="Helvetica Neue, Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="320" fill="#ffffff" rx="8"/>

  <!-- Input -->
  <rect x="20" y="130" width="100" height="60" rx="6" fill="#f0f2f5" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="70" y="165" text-anchor="middle" font-size="13" fill="#1a1a2e" font-weight="600">Input</text>
  <text x="70" y="180" text-anchor="middle" font-size="10" fill="#6c757d">x ∈ ℝⁿ</text>

  <!-- Arrow -->
  <line x1="120" y1="160" x2="155" y2="160" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Embedding -->
  <rect x="155" y="130" width="100" height="60" rx="6" fill="#e8edf5" stroke="#0f3460" stroke-width="1.5"/>
  <text x="205" y="158" text-anchor="middle" font-size="13" fill="#0f3460" font-weight="600">Embedding</text>
  <text x="205" y="175" text-anchor="middle" font-size="10" fill="#6c757d">+ Position</text>

  <!-- Arrow -->
  <line x1="255" y1="160" x2="290" y2="160" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Sparse Attention Block (main) -->
  <rect x="290" y="50" width="220" height="220" rx="8" fill="#ffffff" stroke="#0f3460" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="400" y="75" text-anchor="middle" font-size="12" fill="#0f3460" font-weight="600">Sparse Attention Block × N</text>

  <!-- Sub-blocks inside -->
  <rect x="310" y="90" width="180" height="40" rx="4" fill="#fff3cd" stroke="#e94560" stroke-width="1.5"/>
  <text x="400" y="115" text-anchor="middle" font-size="12" fill="#1a1a2e" font-weight="600">Sparse Mask Generation</text>

  <line x1="400" y1="130" x2="400" y2="145" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="310" y="145" width="180" height="40" rx="4" fill="#cce5ff" stroke="#0f3460" stroke-width="1.5"/>
  <text x="400" y="170" text-anchor="middle" font-size="12" fill="#1a1a2e" font-weight="600">Masked Attention (Q,K,V)</text>

  <line x1="400" y1="185" x2="400" y2="200" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="310" y="200" width="180" height="40" rx="4" fill="#f0f2f5" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="400" y="225" text-anchor="middle" font-size="12" fill="#1a1a2e" font-weight="600">Feed Forward + LayerNorm</text>

  <!-- Arrow out -->
  <line x1="510" y1="160" x2="555" y2="160" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Task Head -->
  <rect x="555" y="120" width="110" height="80" rx="6" fill="#16213e" stroke="#16213e" stroke-width="1.5"/>
  <text x="610" y="155" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="600">Task Head</text>
  <text x="610" y="175" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">Classification</text>
  <text x="610" y="190" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">/ Generation</text>

  <!-- Arrow out -->
  <line x1="665" y1="160" x2="700" y2="160" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="700" y="130" width="80" height="60" rx="6" fill="#e94560" stroke="#e94560" stroke-width="1.5"/>
  <text x="740" y="158" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="700">ŷ</text>
  <text x="740" y="175" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">Output</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6c757d"/>
    </marker>
  </defs>
</svg>
